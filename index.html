<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cascadia+Mono:ital,wght@0,200..700;1,200..700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./public/css/main.css">
  <title>Tektronics project</title>
</head>
<body>
  <div class="container">

  <!----- header section ----->
    <header>
        <h1>Tektronics</h1>
      <div class="nav-bar">
        <a class="link" href="#">Popular Tech</a>
        <a class="link" href="#">Todays Deals</a>
      </div>
       <button class="ham-burger">
        <div class="burger-bar bar-top"></div>
         <div class="burger-bar bar-center"></div>
         
         <div class="burger-bar bar-bottom"></div>
      </button>
      <button class="cart-btn"><i class="bi bi-bag"></i></button>
    </header>
  <!----- header section ----->

  

  <!----- main section ----->
    <main>

    <!--- hero-section --->
      <section class="hero-section">
          <img class="hero-image" src="./public/assets/images/vista-wei-lzePW7ESwts-unsplash.jpg" alt="image of laptop and smartphone">
        <div class="hero-content">
          <h2>one stop shop to buy your tech</h2>
          <button class="hero-btn">Shop Now</button>
        </div>
      </section>
     <!--- hero-section --->



     <!-- product-section -->
        <section class="tech-products">
            <h2>Popular Tech</h2>
          <div class="product-cards">

            <article class="product-card">
              <div class="card-text-content">
               <h3>macbook</h3>
                <p>laptop</p>
                <span class="item-price">$</span>
                <button class="item-btn">purchase</button>
              </div>
              <img class="card-image" src="./public/assets/images/dlxmedia-hu-UkpTGYox6RM-laptop.jpg" alt="image of laptop">
            </article>
          </div>
        </section>
    </main>
    
  </div>
  <script src="./public/js/script.js"></script>
</body>
</html>
