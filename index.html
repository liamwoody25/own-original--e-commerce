<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cascadia+Mono:ital,wght@0,200..700;1,200..700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./public/css/main.css">
  <title>Tektronics project</title>
</head>
<body>
  <div class="container">

  <!----- header section ----->
    <!-- shopping section slide in -->
        <div class="shopping-section">
          <div class="cart-content"></div>
        </div>
      <!-- shopping section slide in -->
    <header>
        <h1>Tektronics</h1>
      <div class="nav-bar">
        <a class="link" href="#">Popular Tech</a>
        <a class="link" href="#">Todays Deals</a>
      </div>

    

      <!-- ham-burger drop down -->
        <button class="ham-burger" aria-label="ham-burger">
          <div class="burger-bar bar-top"></div>
          <div class="burger-bar bar-center"></div>
          <div class="burger-bar bar-bottom"></div>
        </button>
      <!-- ham-burger drop down -->

      <!-- shopping bag slide in button -->
        <button class="cart-btn" aria-label="cart-btn">
          <i class="bi bi-bag"></i>
          <span class="item-output" id="input">0</span>
        </button>
      <!-- shopping bag slide in -->

    </header>
  <!----- header section ----->

  

  <!----- main section ----->
    <main>

    <!--- hero-section --->
      <section class="hero-section">
        <div class="hero-content">
          <h2>one stop shop to buy your tech</h2>
          <button class="hero-btn">Shop Now</button>
        </div>
          <img class="hero-image" src="./public/assets/images/vista-wei-lzePW7ESwts-unsplash.jpg" alt="image of laptop and smartphone">
        
      </section>
     <!--- hero-section --->



     <!-- product-section -->
        <section class="tech-products">
            <h2>Popular Tech</h2>
          <div class="product-cards">

          <!---- product-card-1 ---->
            <article class="product-card">
              <div class="card-text-content">
                <h3>macbook</h3>
                <p>laptop</p>
                <span class="item-price">$899</span>
                <button aria-label="item-btn" class="item-btn">Add To Bag</button>
              </div>
              <img class="card-image" src="./public/assets/images/pexels-tuurt-macbook-jpg.jpg" alt="image of laptop">
            </article>
          <!---- product-card-1 ---->


          <!---- product-card-2 ---->
            <article class="product-card">
              <div class="card-text-content">
                <h3>android</h3>
                <p>smartwatch</p>
                <span class="item-price">$399</span>
                <button aria-label="item-btn" class="item-btn">Add To Bag</button>
              </div>
              <img class="card-image" src="./public/assets/images/rachit-tank-2cFZ_FB08U-smart-watch.jpg" alt="image of smartwatch">
            </article>
          <!---- product-card-2 ---->

          
          <!---- product-card-3 ---->
            <article class="product-card">
              <div class="card-text-content">
                <h3>iphone</h3>
                <p>smartphone</p>
                <span class="item-price">$699</span>
                <button aria-label="item-btn" class="item-btn">Add To Bag</button>
              </div>
              <img class="card-image" src="./public/assets/images/E9965BCB-3B0C-414F-9F91-smartphone.jpg" alt="image of smartphone">
            </article>
          <!---- product-card-3 ---->



          <!---- product-card-4 ---->
            <article class="product-card">
              <div class="card-text-content">
                <h3>Headset</h3>
                <p>Accessories</p>
                <span class="item-price">$250</span>
                <button aria-label="item-btn" class="item-btn">Add To Bag</button>
              </div>
              <img class="card-image" src="./public/assets/images/pexels-cottonbro-headphones-jpg.jpg" alt="image of headphones">
            </article>
          <!---- product-card-4 ---->



          <!---- product-card-5 ---->
            <article class="product-card">
              <div class="card-text-content">
                <h3>ipad</h3>
                <p>tablet</p>
                <span class="item-price">$499</span>
                <button aria-label="item-btn" class="item-btn">Add To Bag</button>
              </div>
                <img class="card-image" src="./public/assets/images/pexels-joshsorenson-tablet.png" alt="image of tablet">
            </article>
          </div>
        </section>

        <section class="todays-deals">
            <h2>Todays Deals</h2>
          <div class="todays-cards">

          <!-- deals card-1 -->
            <article class="item-card">
                <img class="item-img" src="./public/assets/images/pexels-cottonbro-headphones-jpg.jpg" alt="image of headphones">
              <div class="product-text-content">
                <h3>Headset</h3>
                <p>Accessories</p>
                <span class="item-price">$250</span>
              </div>
                <butto aria-label="product-btn" class="product-btn">Add To Bag</button>
            </article>
          <!-- deals card-1 -->


          </div>
        </section>
    </main>
    
  </div>
  <script src="./public/js/script.js"></script>
</body>
</html>
